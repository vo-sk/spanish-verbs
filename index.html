<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <meta name="description" content="Practice Spanish verb conjugations with speech recognition. Record your pronunciation and get instant feedback.">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <title>Spanish Verbs - Mobile Practice</title>
    <link rel="stylesheet" href="styles.css?v=20260408d">
</head>
<body>
    <div class="container">
        <header>
            <h1>🇪🇸 Spanish Verbs</h1>
            <p class="subtitle">Master your conjugations</p>
        </header>

        <main>
            <div class="verb-card">
                <h2 id="verb-display">hablar</h2>
                <p class="verb-translation" id="translation">to speak</p>
                <div id="verb-score-display" class="verb-score-container"></div>
                
                <div class="tense-selector">
                    <button class="tense-btn active" data-tense="present">Present</button>
                    <button class="tense-btn" data-tense="preterite">Preterite</button>
                    <button class="tense-btn" data-tense="imperfect">Imperfect</button>
                    <button class="tense-btn" data-tense="future">Future</button>
                </div>

                <div class="conjugations" id="conjugations">
                    <!-- Content will be dynamically generated by JavaScript -->
                </div>

                <button class="btn-primary" id="nextVerb">Next Verb</button>
            </div>
        </main>
    </div>

    <script src="app.js?v=20260408d"></script>
</body>
</html>
